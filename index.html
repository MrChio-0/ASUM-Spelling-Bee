<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASUM Spelling Bee - Pro Edition v8.6 (21:9 Fixed with Independent Fun Bank)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-yellow: #FFD966;
            --light-yellow: #FFF2CC;
            --honey-orange: #F4B183;
            --dark-brown: #593E26;
            --soft-white: #FFFAEE;
            --correct-green: #A9D18E;
            --incorrect-red: #FF9999;
            --alert-red: #d9534f;
            --import-blue: #61A5C2;
            --export-purple: #9975B9;
            --fun-purple: #B39DDB;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Nunito', sans-serif;
            background-color: #1a1a1a; 
            color: var(--dark-brown);
            height: 100vh; width: 100vw; overflow: hidden; user-select: none;
            display: flex; align-items: center; justify-content: center;
        }

        h1, h2, h3, button, select, #prep-counter, .timer-display, #game-word, #fun-number { 
            font-family: 'Fredoka One', cursive, sans-serif; 
        }

        /* 鎖定 21:9 比例 */
        .page {
            display: none; 
            width: 100vw; 
            aspect-ratio: 21 / 9; 
            max-height: 100vh;
            background: radial-gradient(circle at center, var(--soft-white) 0%, var(--light-yellow) 100%);
            position: relative; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .active { display: flex; }

        .page::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 250, 238, 0.4); z-index: 1;
        }
        #main-page::before { background-color: rgba(255, 250, 238, 0.1); }
        #fun-page::before { display: none; } 
        .page > * { z-index: 2; }

        button, select {
            background-color: var(--primary-yellow);
            color: var(--dark-brown);
            border: 3px solid var(--honey-orange);
            border-radius: 20px;
            padding: 10px 20px; font-size: 1.1rem;
            cursor: pointer; transition: all 0.2s;
            outline: none;
        }
        button:hover { transform: translateY(-2px); background-color: var(--honey-orange); color: white; }
        button:disabled { background-color: #ccc !important; border-color: #aaa !important; color: #888 !important; cursor: not-allowed; transform: none !important; }

        /* 右下角小按鈕全域樣式 */
        .utility-btn {
            position: absolute;
            bottom: 15px;
            font-size: 0.85rem;
            padding: 5px 12px;
            border-radius: 12px;
            background-color: rgba(89, 62, 38, 0.1);
            border: 2px solid var(--dark-brown);
            color: var(--dark-brown);
            z-index: 10;
            opacity: 0.7;
        }
        .utility-btn:hover {
            opacity: 1;
            transform: translateY(-1px);
            background-color: var(--dark-brown);
            color: white;
        }

        /* 調整右下角各按鈕的水平排列位置 */
        .pos-mute { right: 15px; }
        .pos-speed { right: 15px; } 
        .pos-reveal { right: 130px; } 

        .btn-active {
            background-color: var(--honey-orange);
            color: white;
            opacity: 0.9;
        }

        /* --- Main Page --- */
        #main-page { background-image: url('image_0.png'); background-size: 100% 100%; }
        .top-logo { 
            position: absolute; top: 15%; left: 50%; 
            transform: translateX(-50%); width: 600px; 
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.15)); 
        }
        .main-controls { display: flex; gap: 25px; align-items: center; margin-top: 40vh; }

        /* --- Prep Page --- */
        #prep-page { 
            background-color: var(--primary-yellow) !important; 
            background-image: none !important; 
        }
        #prep-page::before { display: none; }
        #prep-counter { 
            font-size: 15rem; 
            color: white; 
            text-shadow: 10px 10px 0px var(--honey-orange); 
            z-index: 10;
        }

        /* --- Word Bank Page --- */
        #word-bank-page { background-image: url('image_0.png'); background-size: 100% 100%; padding: 20px; justify-content: flex-start; }
        .bank-header { display: flex; justify-content: space-between; width: 100%; max-width: 1100px; margin-bottom: 10px; margin-top: 20px; }
        .level-tabs { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .level-tabs button.selected { background-color: var(--honey-orange); color: white; }
        .bank-content { display: flex; gap: 20px; width: 100%; max-width: 1100px; height: 45vh; }
        .input-section { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        textarea { flex: 1; border-radius: 15px; border: 3px solid var(--honey-orange); padding: 15px; font-size: 1.1rem; resize: none; font-family: 'Nunito', sans-serif; }
        .list-section { flex: 1; background: white; border-radius: 15px; border: 3px solid var(--honey-orange); overflow-y: auto; padding: 10px; }
        .word-item { padding: 8px 15px; margin-bottom: 5px; border-radius: 10px; background: var(--light-yellow); cursor: pointer; font-weight: bold; }
        .word-item.selected-word { background: var(--honey-orange); color: white; }

        /* --- Game Page --- */
        #game-page { background-size: 100% 100%; }
        .timer-display { font-size: 4rem; background: white; padding: 10px 30px; border-radius: 30px; border: 5px solid var(--primary-yellow); transition: all 0.2s; }
        .timer-out { color: var(--alert-red); border-color: var(--alert-red); transform: scale(1.1); box-shadow: 0 0 20px rgba(217, 83, 79, 0.3); }
        #game-word { font-size: 7rem; text-align: center; margin-bottom: 40px; min-height: 140px; display: flex; align-items: center; justify-content: center; }
        .word-hidden { color: #b1a796 !important; font-size: 3.5rem !important; opacity: 0.6; }

        /* --- Spelling Fun Page --- */
        #fun-page { background-image: url('spfun1.png'); background-size: 100% 100%; }
        #fun-number { font-size: 12rem; color: var(--dark-brown); text-shadow: 5px 5px 0px rgba(255,255,255,0.8); margin-bottom: 20px; min-height: 250px; display: flex; align-items: center; justify-content: center; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--soft-white); padding: 40px; border-radius: 30px; text-align: center; border: 5px solid var(--honey-orange); }
    </style>
</head>
<body onclick="startBgMusic()">

    <audio id="bg-music" src="bgmusic.mp3" loop></audio>
    <audio id="ding-sound" src="ding_1.MP3"></audio>

    <!-- Main Page -->
    <div id="main-page" class="page active">
        <img src="logo_01.png" class="top-logo">
        <div style="position:absolute; top:20px; right:20px; display:flex; gap:15px;">
            <!-- 右上角原本功能完整保留 -->
            <button onclick="openFunPage()" style="background-color: var(--fun-purple); color: white; border-color: #9575CD;">🎉 Spelling Fun</button>
            <button onclick="openBank()">📚 Word Bank</button>
        </div>
        <div class="main-controls">
            <select id="main-level-select">
                <option value="0" disabled selected>Select Level</option>
                <option value="1">LEVEL 1</option><option value="2">LEVEL 2</option>
                <option value="3">LEVEL 3</option><option value="4">LEVEL 4</option>
                <option value="5">LEVEL 5</option><option value="6">LEVEL 6</option>
                <option value="fun">🎉 SPELLING FUN</option>
            </select>
            <button onclick="startPreparation()">▶ START!</button>
            <button onclick="setTime()" id="btn-time">⏱ TIME</button>
        </div>
        <p id="dict-status" style="position:absolute; bottom:15px; left:20px; margin:0; font-weight:bold;">Dictionary: Loading...</p>
        
        <button class="utility-btn toggle-mute-btn pos-mute" onclick="toggleMute(event)">🔊 Music</button>
    </div>

    <div id="prep-page" class="page"><div id="prep-counter">3</div></div>

    <!-- Word Bank Page -->
    <div id="word-bank-page" class="page">
        <div class="bank-header">
            <button onclick="goHome()">⬅ BACK</button>
            <div style="display:flex; gap:10px;">
                <button onclick="exportBank()" style="background-color: var(--export-purple); color:white;">📥 Export (.json)</button>
                <button onclick="triggerImport()" style="background-color: var(--import-blue); color:white;">📤 Import (.json)</button>
                <input type="file" id="import-file" style="display:none" accept=".json" onchange="handleImport(event)">
            </div>
        </div>
        <div class="level-tabs">
            <button onclick="switchBankLevel(1)" id="tab-1" class="selected">LEVEL 1</button>
            <button onclick="switchBankLevel(2)" id="tab-2">LEVEL 2</button>
            <button onclick="switchBankLevel(3)" id="tab-3">LEVEL 3</button>
            <button onclick="switchBankLevel(4)" id="tab-4">LEVEL 4</button>
            <button onclick="switchBankLevel(5)" id="tab-5">LEVEL 5</button>
            <button onclick="switchBankLevel(6)" id="tab-6">LEVEL 6</button>
            <button onclick="switchBankLevel('fun')" id="tab-fun" style="background-color: var(--fun-purple); color: white; border-color: #9575CD;">🎉 SPELLING FUN</button>
        </div>
        <h3 id="bank-stats">Total: 0</h3>
        <div class="bank-content">
            <div class="input-section">
                <textarea id="bulk-input" placeholder="Paste words here..."></textarea>
                <div style="display:flex; gap:10px;">
                    <button onclick="addWords(true)" style="flex:1;">➕ Add (Check)</button>
                    <button onclick="addWords(false)" style="flex:1; background-color: #FFCC00;">🔥 Force Add</button>
                </div>
            </div>
            <div class="list-section" id="word-list"></div>
        </div>
        <div style="margin-top:15px; display:flex; gap:20px;">
            <button onclick="removeSelectedWord()" style="background-color:var(--incorrect-red);">🗑 Remove Word</button>
            <button onclick="clearCurrentLevel()" style="background-color:var(--alert-red); color:white;">🔥 CLEAR LEVEL</button>
        </div>

        <button class="utility-btn toggle-mute-btn pos-mute" onclick="toggleMute(event)">🔊 Music</button>
    </div>

    <!-- Game Page -->
    <div id="game-page" class="page">
        <div style="position:absolute; top:20px; left:40px; right:40px; display:flex; justify-content:space-between; align-items:center;">
            <button onclick="endGameEarly()">⬅ BACK</button>
            <div class="timer-display" id="timer">00:00</div>
        </div>
        <div id="game-word" onclick="toggleWordVisibility(event)">Word</div>
        <div style="display:flex; gap:35px;">
            <button style="background-color:var(--incorrect-red); font-size:1.4rem; padding: 15px 40px;" onclick="markAnswer(false)">✖ Incorrect</button>
            <button style="background-color:var(--primary-yellow);" onclick="speakCurrentWord()">🔊 Pardon</button>
            <button style="background-color:var(--correct-green); font-size:1.4rem; padding: 15px 40px;" onclick="markAnswer(true)">✔ Correct</button>
        </div>

        <button class="utility-btn pos-reveal btn-active" id="btn-reveal-switch" onclick="toggleRevealMode(event)">🔍 Hide: ON</button>
        <button class="utility-btn pos-speed" id="btn-speech-speed" onclick="adjustSpeechSpeed(event)">⚡ Speed: 0.8</button>
    </div>

    <!-- Spelling Fun Page -->
    <div id="fun-page" class="page">
        <div style="position:absolute; top:20px; left:40px;">
            <button onclick="goHome()">⬅ BACK</button>
        </div>
        <div id="fun-number">?</div>
        <div>
            <button id="btn-random" style="font-size:1.5rem; padding: 15px 45px; background-color: var(--honey-orange); color: white;" onclick="startRandomNumber()">Random Numbers</button>
        </div>

        <button class="utility-btn toggle-mute-btn pos-mute" onclick="toggleMute(event)">🔊 Music</button>
    </div>

    <div class="modal-overlay" id="result-modal">
        <div class="modal">
            <h2>Time's Up! ⏱</h2>
            <p style="font-size:2.5rem; color:var(--correct-green);">✔ Correct: <span id="res-correct">0</span></p>
            <p style="font-size:2.5rem; color:var(--incorrect-red);">✖ Incorrect: <span id="res-incorrect">0</span></p>
            <button onclick="closeModalAndHome()">Back to Home</button>
        </div>
    </div>

    <script>
        let wordBank = { 1: [], 2: [], 3: [], 4: [], 5: [], 6: [], 'fun': [] };
        let englishDictionary = new Set(["a", "apple", "bee", "honey", "whiteboard", "center", "centre", "color", "colour"]); 
        let gameTimeLimit = 0, currentBankLevel = 1, selectedWordInBank = null;
        let timerInterval, remainingTime = 0, score = { correct: 0, incorrect: 0 }, gameWords = [], currentWord = "";
        let timeIsUp = false;
        let isWordRevealed = false;
        let isHideModeActive = true; 
        let shuffleInterval = null; 
        let isMuted = false; 
        let speechSpeed = 0.8; 

        const bgMusic = document.getElementById('bg-music');
        const dingSound = document.getElementById('ding-sound');
        bgMusic.volume = 0.5;

        function startBgMusic() { 
            if (isMuted) bgMusic.volume = 0; else bgMusic.volume = 0.5;
            if (!document.getElementById('game-page').classList.contains('active') && !document.getElementById('prep-page').classList.contains('active')) {
                bgMusic.play().catch(e => {}); 
            }
        }
        function stopBgMusic() { bgMusic.pause(); bgMusic.currentTime = 0; }

        function toggleMute(event) {
            if(event) event.stopPropagation(); 
            isMuted = !isMuted;
            if (isMuted) bgMusic.volume = 0; else bgMusic.volume = 0.5;

            const muteButtons = document.querySelectorAll('.toggle-mute-btn');
            muteButtons.forEach(btn => {
                btn.innerHTML = isMuted ? "🔇 Muted" : "🔊 Music";
            });
        }

        function adjustSpeechSpeed(event) {
            if(event) event.stopPropagation();
            let inputSpeed = prompt("Enter Speech Speed (Recommended: 0.5 - 1.5):", speechSpeed);
            if (inputSpeed !== null) {
                let parsed = parseFloat(inputSpeed);
                if (!isNaN(parsed) && parsed > 0 && parsed <= 3) {
                    speechSpeed = parsed;
                    document.getElementById('btn-speech-speed').innerText = `⚡ Speed: ${speechSpeed}`;
                } else {
                    alert("Please enter a valid number between 0.1 and 3.0");
                }
            }
        }

        function toggleRevealMode(event) {
            if(event) event.stopPropagation();
            isHideModeActive = !isHideModeActive;
            
            const btn = document.getElementById('btn-reveal-switch');
            const wordEl = document.getElementById('game-word');

            if (isHideModeActive) {
                btn.innerText = "🔍 Hide: ON";
                btn.classList.add('btn-active');
                isWordRevealed = false;
                wordEl.innerText = "[ Press Space to Reveal ]";
                wordEl.classList.add('word-hidden');
            } else {
                btn.innerText = "🔍 Hide: OFF";
                btn.classList.remove('btn-active');
                isWordRevealed = true;
                wordEl.innerText = currentWord;
                wordEl.classList.remove('word-hidden');
            }
        }

        async function loadExtendedDictionary() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt');
                const text = await response.text();
                text.split('\n').forEach(w => { if(w.trim()) englishDictionary.add(w.trim().toLowerCase()); });
                document.getElementById('dict-status').innerText = `Dictionary Ready: ${englishDictionary.size.toLocaleString()} words.`;
            } catch (e) { document.getElementById('dict-status').innerText = "Offline Mode."; }
        }
        loadExtendedDictionary();

        // 升級本地版本號以防讀取衝突
        function autoSaveToLocal() { localStorage.setItem('ASUM_DATA_V86_FUN', JSON.stringify(wordBank)); }
        function exportBank() {
            const dataStr = JSON.stringify(wordBank, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `ASUM_WordBank_${new Date().toISOString().slice(0,10)}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }
        function triggerImport() { document.getElementById('import-file').click(); }
        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (importedData[1] && Array.isArray(importedData[1])) {
                        if(!importedData['fun']) importedData['fun'] = [];
                        wordBank = importedData; renderWordList(); autoSaveToLocal(); alert("🎉 Import Successful!");
                    }
                } catch (err) { alert("❌ Error."); }
            };
            reader.readAsText(file);
        }

        function loadBank() {
            const data = localStorage.getItem('ASUM_DATA_V86_FUN');
            if (data) { 
                let parsed = JSON.parse(data);
                if(!parsed['fun']) parsed['fun'] = [];
                wordBank = parsed; 
                renderWordList(); 
            }
        }
        loadBank();

        // 優化後的加字檢驗邏輯
        function addWords(checkDict = true) {
            let lines = document.getElementById('bulk-input').value.split('\n');
            let added = 0, dups = 0, typoList = [];
            lines.forEach(line => {
                let entry = line.trim();
                if(!entry) return;
                if(!/^[a-zA-Z\s\-\/\(\)]+$/.test(entry)) { typoList.push(entry); return; }
                if(checkDict) {
                    let segments = entry.toLowerCase().split(/[\s\/\(\)\-]+/).filter(s => s.length > 0);
                    if(!segments.every(s => englishDictionary.has(s))) { typoList.push(entry); return; }
                }

                // 【核心修改】重覆字檢查隔離邏輯：
                let isDuplicate = false;
                if (currentBankLevel === 'fun') {
                    // 如果當前是 Spelling Fun 關卡，只檢查 Spelling Fun 自己內部有沒有重複，不理會 LEVEL 1-6
                    isDuplicate = wordBank['fun'].map(w => w.toLowerCase()).includes(entry.toLowerCase());
                } else {
                    // 如果當前是 LEVEL 1-6，只在 LEVEL 1-6 彼此之間查重，完全跳過檢查 Spelling Fun
                    isDuplicate = [1,2,3,4,5,6].some(lvl => 
                        wordBank[lvl].map(w => w.toLowerCase()).includes(entry.toLowerCase())
                    );
                }

                if(isDuplicate) dups++; else { wordBank[currentBankLevel].push(entry); added++; }
            });
            document.getElementById('bulk-input').value = "";
            renderWordList(); autoSaveToLocal();
            let displayLevelName = currentBankLevel === 'fun' ? "Spelling Fun" : `Level ${currentBankLevel}`;
            let msg = `📊 ${displayLevelName}\n\n✅ Added: ${added}\n⚠️ Dups: ${dups}\n❌ Typos: ${typoList.length}`;
            if(typoList.length > 0) msg += `\n- ` + typoList.join('\n- ');
            alert(msg);
        }

        function renderWordList() {
            let listDiv = document.getElementById('word-list'); listDiv.innerHTML = "";
            let displayLevelName = currentBankLevel === 'fun' ? "Spelling Fun" : `Level ${currentBankLevel}`;
            document.getElementById('bank-stats').innerText = `${displayLevelName} Total: ${wordBank[currentBankLevel].length}`;
            wordBank[currentBankLevel].forEach(w => {
                let div = document.createElement('div');
                div.className = 'word-item' + (w === selectedWordInBank ? ' selected-word' : '');
                div.innerText = w;
                div.onclick = () => { selectedWordInBank = w; renderWordList(); };
                listDiv.appendChild(div);
            });
        }

        function startPreparation() {
            let lvl = document.getElementById('main-level-select').value;
            if(lvl == "0" || gameTimeLimit <= 0 || wordBank[lvl].length == 0) return alert("Check Level/Time/Bank!");
            stopBgMusic(); showPage('prep-page');
            let count = 3;
            const run = () => {
                if (count > 0) {
                    document.getElementById('prep-counter').innerText = count;
                    speak(count.toString(), () => { setTimeout(() => { count--; run(); }, 200); });
                } else {
                    document.getElementById('prep-counter').innerText = "START!";
                    speak("Start!", () => startGame());
                }
            };
            run();
        }

        function startGame() {
            let lvl = document.getElementById('main-level-select').value;
            timeIsUp = false; score = { correct: 0, incorrect: 0 };
            gameWords = [...wordBank[lvl]].sort(() => Math.random() - 0.5);
            remainingTime = gameTimeLimit;
            document.getElementById('timer').classList.remove('timer-out');
            
            // 強制將關卡名稱轉為大寫，這樣 lvl 為 'fun' 時就會完美匹配 'LEVELFUN.PNG'
            let bgFileName = `LEVEL${lvl.toString().toUpperCase()}.PNG`;
            document.getElementById('game-page').style.backgroundImage = `url('${bgFileName}')`;
            showPage('game-page'); updateTimerDisplay(); nextWord();
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => { 
                remainingTime--; 
                updateTimerDisplay(); 
                if(remainingTime <= 0) { 
                    clearInterval(timerInterval);
                    timeIsUp = true;
                    dingSound.play().catch(e=>{}); 
                }
            }, 1000);
        }

        function nextWord() {
            if (gameWords.length === 0) return;
            currentWord = gameWords.pop();
            const wordEl = document.getElementById('game-word');

            if (isHideModeActive) {
                isWordRevealed = false;
                wordEl.innerText = "[ Press Space to Reveal ]";
                wordEl.classList.add('word-hidden');
            } else {
                isWordRevealed = true;
                wordEl.innerText = currentWord;
                wordEl.classList.remove('word-hidden');
            }
            speakWord();
        }

        function toggleWordVisibility(event) {
            if(event) event.stopPropagation(); 
            if (!isHideModeActive) return; 

            const wordEl = document.getElementById('game-word');
            if (isWordRevealed) {
                wordEl.innerText = "[ Press Space to Reveal ]";
                wordEl.classList.add('word-hidden');
                isWordRevealed = false;
            } else {
                wordEl.innerText = currentWord;
                wordEl.classList.remove('word-hidden');
                isWordRevealed = true;
            }
        }

        window.addEventListener('keydown', function(event) {
            if (event.code === 'Space' && document.getElementById('game-page').classList.contains('active')) {
                event.preventDefault(); 
                toggleWordVisibility();
            }
        });

        function openFunPage() {
            document.getElementById('fun-number').innerText = "?"; 
            showPage('fun-page');
        }

        function startRandomNumber() {
            const btn = document.getElementById('btn-random');
            const numDisplay = document.getElementById('fun-number');
            btn.disabled = true; 
            
            shuffleInterval = setInterval(() => {
                let rand = Math.floor(Math.random() * 35) + 1;
                numDisplay.innerText = rand;
            }, 50);

            setTimeout(() => {
                clearInterval(shuffleInterval);
                let finalRand = Math.floor(Math.random() * 35) + 1; 
                numDisplay.innerText = finalRand;
                btn.disabled = false; 
                dingSound.play().catch(e=>{}); 
            }, 3000);
        }

        function markAnswer(correct) {
            if(correct) score.correct++; else score.incorrect++;
            if(timeIsUp || gameWords.length === 0) {
                if(!timeIsUp) dingSound.play().catch(e=>{});
                endGameActual();
            } else {
                nextWord();
            }
        }

        function endGameActual() {
            clearInterval(timerInterval);
            setTimeout(() => { 
                document.getElementById('res-correct').innerText = score.correct;
                document.getElementById('res-incorrect').innerText = score.incorrect;
                document.getElementById('result-modal').style.display = 'flex'; 
            }, 500);
        }

        function updateTimerDisplay() {
            let m = Math.max(0, Math.floor(remainingTime / 60)).toString().padStart(2, '0');
            let s = Math.max(0, remainingTime % 60).toString().padStart(2, '0');
            const el = document.getElementById('timer');
            el.innerText = `${m}:${s}`;
            if(remainingTime <= 0) el.classList.add('timer-out');
            else el.classList.remove('timer-out');
        }

        function speak(text, cb) { window.speechSynthesis.cancel(); let m = new SpeechSynthesisUtterance(text); m.lang = 'en-GB'; m.onend = cb; window.speechSynthesis.speak(m); }
        function speakWord() {
            window.speechSynthesis.cancel();
            let cleanWord = currentWord.split(/[\/\(]+/)[0].trim();
            let m = new SpeechSynthesisUtterance(cleanWord);
            m.lang = 'en-GB'; 
            m.rate = speechSpeed; 
            window.speechSynthesis.speak(m);
        }

        function speakCurrentWord() { speakWord(); }
        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function goHome() { 
            if(shuffleInterval) clearInterval(shuffleInterval); 
            document.getElementById('btn-random').disabled = false;
            startBgMusic(); 
            showPage('main-page'); 
        }
        function openBank() { showPage('word-bank-page'); renderWordList(); }
        function setTime() { let i = prompt("Seconds:", "60"); if (i && !isNaN(i)) { gameTimeLimit = parseInt(i); document.getElementById('btn-time').innerText = `⏱ ${gameTimeLimit}s`; } }
        
        function switchBankLevel(l) { 
            currentBankLevel = l; 
            document.querySelectorAll('.level-tabs button').forEach(b => b.classList.remove('selected')); 
            document.getElementById(`tab-${l}`).classList.add('selected'); 
            renderWordList(); 
        }
        
        function removeSelectedWord() { wordBank[currentBankLevel] = wordBank[currentBankLevel].filter(w => w !== selectedWordInBank); selectedWordInBank = null; renderWordList(); autoSaveToLocal(); }
        function clearCurrentLevel() { if(confirm(`Clear current level words?`)) { wordBank[currentBankLevel] = []; renderWordList(); autoSaveToLocal(); } }
        function endGameEarly() { clearInterval(timerInterval); timeIsUp = true; window.speechSynthesis.cancel(); goHome(); }
        function closeModalAndHome() { document.getElementById('result-modal').style.display = 'none'; goHome(); }
    </script>
</body>
</html>
